apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vehicle-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: vehicle-app.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000