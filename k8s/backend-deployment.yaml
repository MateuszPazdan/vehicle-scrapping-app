apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vehicle-backend
  template:
    metadata:
      labels:
        app: vehicle-backend
    spec:
      containers:
      - name: backend
        image: vehicle-backend/backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"