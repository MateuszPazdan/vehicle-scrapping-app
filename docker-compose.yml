services:
  postgres:
    image: postgres:latest
    env_file:
      - ./backend/.env
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U db_admin -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_KEY: http://localhost:8000
        NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      - backend

  pg-admin:
    image: dpage/pgadmin4
    restart: always
    ports:
      - '8888:80'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    env_file:
      - ./backend/.env

volumes:
  pgadmin-data:
  grafana-data:
